<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<!-- Google Fonts -->

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background-light dark:bg-background-dark min-h-screen text-[#111418] dark:text-white">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-[#dbe0e6] dark:border-[#2a3441] bg-white dark:bg-[#1a2633] px-6 md:px-10 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4 text-primary">
<div class="size-8">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"></path>
</svg>
</div>
<h2 class="text-[#111418] dark:text-white text-xl font-bold leading-tight tracking-tight">Ufoundit</h2>
</div>
<div class="flex flex-1 justify-end gap-4 items-center">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary transition-colors hover:bg-primary/20">
<span class="material-symbols-outlined text-xl">notifications</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/20" data-alt="User profile avatar placeholder" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAZeqxFxeDBWqfSWXub_bWjirFgea8BJjdKlOSo6gepAhTcCBQRnBXA9PC5TkI5-vzsjrYeARpZH6H8jeKk6ewXFzbcZOwSfTi6sqvKKDoYWpXs5kjfHSOfo_5R2bvHev_MP-Sjo6TlDu0XTKNLLQvf-ZjcORIhdOs8GBEsszrFZaOGGPHL32crqoICkm1Bqkr37hQ4eMjNn_BL9ffIR1NtHnSRV_b3w3PsDoRKxHPafuIElDFcdRcW_TZz7nKNnibyc8TMgHteD-9f");'></div>
</div>
</header>
<!-- Main Content Container -->
<main class="flex flex-1 justify-center py-8 px-4 md:py-12">
<div class="layout-content-container flex flex-col max-w-[520px] w-full gap-8">
<!-- Header Text -->
<div class="flex flex-col gap-2 text-center md:text-left">
<h1 class="text-[#111418] dark:text-white text-4xl font-black leading-tight tracking-tight">Edit Profile</h1>
<p class="text-[#617589] dark:text-[#a1b0c0] text-base font-normal leading-normal">Update your campus contact information.</p>
</div>
<!-- Profile Card -->
<div class="bg-white dark:bg-[#1a2633] rounded-xl shadow-sm border border-[#dbe0e6] dark:border-[#2a3441] overflow-hidden">
<div class="p-6 md:p-8 flex flex-col gap-8">
<!-- Profile Picture Section -->
<div class="flex flex-col items-center gap-4">
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-32 border-4 border-background-light dark:border-background-dark shadow-md" data-alt="Default user profile avatar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCcmVF7a4pOI1TsalVolp8tKr1DJeiWiPAOCWumXK0_5XflrjBtsJqj0LxDvlRxZq-7AXSs6VrTW0kByobntZwXHtWoVTxAtoyTv0nXJPJrnJTAdzX5AzORJ2OIzaymZQgETRdBGIaM3f2-aYbSqCxL2bJoSsKgQ9wabsv0VHwyzaD6omuVefk3Fv55e9kY3dV1LBYxbot_VaXC_t9Rq0VTkdNc1HGSCCYOc4ohbaXHKE2LjJLnbz-tQTNn-FwkzTG7GEGkRMFZw1uZ");'></div>
<div class="absolute bottom-1 right-1 bg-primary text-white size-9 rounded-full flex items-center justify-center border-4 border-white dark:border-[#1a2633] shadow-sm">
<span class="material-symbols-outlined text-lg">edit</span>
</div>
<!-- Hover overlay -->
<div class="absolute inset-0 bg-black/20 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="text-white text-xs font-bold uppercase tracking-wider">Change</span>
</div>
</div>
<div class="text-center">
<p class="text-[#111418] dark:text-white text-lg font-bold">Profile Photo</p>
<p class="text-[#617589] dark:text-[#a1b0c0] text-sm">JPG or PNG, max 5MB</p>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-[#111418] dark:text-white text-sm font-semibold ml-1">Full Name</span>
<input class="form-input block w-full rounded-lg border-[#dbe0e6] dark:border-[#2a3441] bg-white dark:bg-[#101922] text-[#111418] dark:text-white focus:border-primary focus:ring-primary h-12 px-4 text-base transition-all" placeholder="e.g. John Doe" type="text" value="Alex Johnson"/>
</label>
<!-- University Email (Read Only) -->
<label class="flex flex-col gap-2">
<span class="text-[#111418] dark:text-white text-sm font-semibold ml-1">University Email</span>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-lg border-[#dbe0e6] dark:border-[#2a3441] bg-[#f8fafc] dark:bg-[#16202b] text-[#617589] dark:text-[#8a99a8] cursor-not-allowed h-12 pl-4 pr-12 text-base" readonly="" type="email" value="alex.johnson@university.edu"/>
<div class="absolute right-3 text-success flex items-center gap-1 bg-success/10 px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-sm font-bold">check_circle</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Verified</span>
</div>
</div>
<p class="text-[#617589] dark:text-[#a1b0c0] text-xs italic mt-1 ml-1 flex items-center gap-1">
<span class="material-symbols-outlined text-xs">info</span>
                                        Synced with Student ID. Cannot be changed.
                                    </p>
</label>
<!-- Phone Number -->
<label class="flex flex-col gap-2">
<span class="text-[#111418] dark:text-white text-sm font-semibold ml-1">Phone Number</span>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-[#617589] dark:text-[#a1b0c0]">call</span>
<input class="form-input block w-full rounded-lg border-[#dbe0e6] dark:border-[#2a3441] bg-white dark:bg-[#101922] text-[#111418] dark:text-white focus:border-primary focus:ring-primary h-12 pl-12 pr-4 text-base transition-all" placeholder="(555) 000-0000" type="tel"/>
</div>
</label>
</div>
<!-- Form Actions -->
<div class="flex flex-col sm:flex-row gap-3 mt-4">
<button class="flex-1 bg-primary text-white h-12 rounded-lg font-bold text-base hover:bg-primary/90 transition-all shadow-md shadow-primary/20 active:scale-[0.98]">
                                    Save Changes
                                </button>
<button class="flex-1 bg-[#f0f2f4] dark:bg-[#2a3441] text-[#111418] dark:text-white h-12 rounded-lg font-bold text-base hover:bg-[#e4e7eb] dark:hover:bg-[#34404f] transition-all active:scale-[0.98]">
                                    Cancel
                                </button>
</div>
</div>
</div>
<!-- Footer Note -->
<p class="text-center text-[#617589] dark:text-[#a1b0c0] text-sm px-4">
                        By updating your information, you ensure that campus security and fellow students can reach you regarding lost items.
                    </p>
</div>

</div>
